name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; no job needs write access (the SECURITY.md
# supply-chain policy). Grant extra scope per-job if ever required.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: Tests (macOS, Swift 6)
    runs-on: macos-15
    steps:
      # Actions are pinned to a full commit SHA, never a mutable tag (tj-actions
      # CVE-2025-30066). Dependabot bumps the SHA.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Cache the SwiftPM shared dependency-clone directory (NOT compiled artifacts,
      # which are not safely portable across commits). Keyed on Package.swift so a
      # dependency change invalidates it; restore-keys lets a stale key still seed the
      # clones. Speeds `swift build`/`resolve` across runs.
      - name: Cache SwiftPM dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/.cache/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}
          restore-keys: ${{ runner.os }}-spm-
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Dependency audit (OSV advisory scan)
        # Folded in from the former standalone `audit` job (one fewer runner + one fewer
        # resolve). `swift build` above already wrote Package.resolved. Fails the build if
        # any pinned dependency version has a known advisory in the OSV/GitHub Advisory
        # Database (backs the SECURITY.md monitoring policy with an enforced gate).
        run: ./Scripts/dependency-audit.sh Package.resolved
      - name: FFI isolation guard (default graph pulls zero Rust)
        # The opt-in Tempo 0x76 FFI must never leak into the default package graph, so
        # a consumer of MPPCore / MPPClient / MPPServer / MPPTempo links no Rust. Cheap
        # and Rust-free, so it runs in this required job rather than the non-required
        # rust-ffi one. (The build + test steps above already prove the default graph
        # builds with no xcframework present; this asserts the invariant explicitly.)
        run: ./Scripts/assert-ffi-isolation.sh

  linux:
    name: Tests (Linux, Swift 6)
    runs-on: ubuntu-latest
    # Base image pinned by digest, not the mutable `swift:6.0` tag (the aquasec/trivy
    # Docker Hub compromise, Mar 2026, overwrote mutable tags). Digest captured
    # 2026-05-29 for swift:6.0 (6.0.3). Dependabot does not bump workflow `container:`
    # digests, so this is ROTATED MANUALLY: refresh on a roughly monthly cadence and
    # whenever a Swift/Ubuntu base advisory lands (re-capture via
    # `docker buildx imagetools inspect swift:6.0`). The OSV gate covers SwiftPM deps,
    # not the OS image, so this manual cadence is the control for the base layer.
    container: swift@sha256:cf429de05c3e84a230a75e68eaa7bf7d1367ef9dde0a1278fb2a3d53d1881040
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Cache SwiftPM dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/.cache/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}
          restore-keys: ${{ runner.os }}-spm-
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  conformance:
    # Name kept as "Conformance (local)" to match the required status check in branch
    # protection; this job now also runs the reverse direction (folded in from the former
    # standalone "Conformance (reverse)" job).
    name: Conformance (local)
    runs-on: macos-15 # has swift preinstalled; node via setup-node
    # Both offline cross-SDK directions in one job (one runner, one setup-node, the
    # second swift build reuses the first's .build). Both are OFFLINE and deterministic
    # (zero-amount proof is ecrecover, no RPC), so a compromised npm dep is contained:
    # no secrets, only `contents: read` (repo default), and the harness installs with
    # `npm ci --ignore-scripts` against the committed lockfile.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: Cache SwiftPM dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/.cache/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}
          restore-keys: ${{ runner.os }}-spm-
      # Forward: the Swift client pays a zero-amount Tempo proof 402 issued and verified
      # by the reference mppx (TypeScript) server, over real HTTP.
      - name: Cross-SDK conformance (Swift client -> mppx server, offline)
        run: Scripts/conformance/run.sh
      # Reverse: the reference mppx CLIENT pays OUR Swift server (MPPConformanceServer
      # + TempoProofVerifier) over real HTTP.
      - name: Cross-SDK conformance (mppx client -> our server, offline)
        run: Scripts/conformance/run-reverse.sh

  conformance-testnet:
    name: Conformance (testnet)
    runs-on: macos-15
    # NON-REQUIRED (kept out of branch protection): this job makes outbound calls
    # to the live Moderato node, so it depends on a third party being up and opens
    # network egress while third-party npm code runs (the one real delta vs the
    # offline job; mitigated by no-secrets + contents:read + --ignore-scripts). It
    # exists to keep a live-chain signal and as the seam for the future
    # settled-transfer test. Disable if it proves flaky.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: Cross-SDK conformance against live Moderato (chainId 42431)
        run: Scripts/conformance/run.sh --testnet

  live-moderato:
    name: Live Moderato (Swift e2e)
    runs-on: macos-15
    # NON-REQUIRED (kept out of branch protection): runs the gated live tests
    # (MPP_MODERATO_E2E=1) directly against the live Moderato node, so it depends on
    # a third party being up. It gives a real-chain signal for the EVM RPC + escrow
    # read path (eth_chainId, getChannel, nonce, gasPrice). The write-path e2e
    # (open / topUp / close / settle) lands here once the 0x76 FFI can build a signed
    # transaction. Disable if it proves flaky.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Live Moderato Swift tests
        env:
          MPP_MODERATO_E2E: "1"
        run: swift test --filter Moderato

  rust-ffi:
    name: Rust FFI (tempo-tx-ffi build + test)
    # NON-REQUIRED (kept out of branch protection): builds the tempo-tx-ffi crate,
    # which git-clones the tempo monorepo and compiles a large Rust tree (revm etc.).
    # It is the 0x76 transaction builder; the cargo test runs the byte-exact golden
    # vector for the close tx. Built on BOTH macOS and Linux: the eventual artifact is
    # an Apple xcframework + a Linux .so, and the golden bytes must match on both.
    # Pinned tag tempo-primitives@1.8.0 needs rustc >= 1.93.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Cache the Cargo registry/git clones + the crate's build dir, keyed on Cargo.lock
      # (per OS leg). The dominant cost here is compiling the large revm/tempo tree; this
      # turns a clean ~4-5 min compile into an incremental one on a cache hit.
      - name: Cache Cargo + crate target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/tempo-tx-ffi/target
          # Key is per-OS AND per-job. The Linux leg here and the linux-ffi job both
          # resolve runner.os == Linux but build in different environments (bare VM vs
          # swift container; different glibc/system libs), so their compiled target/ is
          # not interchangeable. Cache keys are write-once, so a shared key would let one
          # job win the save and force the other to recompile every time; distinct keys
          # give each its own effective cache.
          key: rust-ffi-${{ runner.os }}-cargo-${{ hashFiles('rust/tempo-tx-ffi/Cargo.lock') }}
          restore-keys: rust-ffi-${{ runner.os }}-cargo-
      - name: Ensure rustc >= 1.93 (tempo-primitives MSRV)
        run: |
          rustup update stable && rustup default stable
          ver=$(rustc --version | awk '{print $2}')
          printf '1.93.0\n%s\n' "$ver" | sort -V -C || {
            echo "::error::rustc $ver is below the 1.93 floor"; exit 1; }
          echo "rustc $ver OK"
      - name: Build + test the FFI crate
        working-directory: rust/tempo-tx-ffi
        run: cargo test
      - name: Build TempoTxFFI xcframework + drift-check the committed bindings
        # Package the staticlib + C header into the xcframework SwiftPM links via the
        # binaryTarget, and refresh Sources/MPPTempoFFI/Generated. The committed UniFFI
        # bindings must match what the pinned crate regenerates (they are reviewable
        # source, not a blob); a drift fails the build with how to fix it.
        # On a pull_request build only the macOS slice (TEMPO_FFI_MACOS_ONLY=1) for speed:
        # the drift-check, swift test, and live e2e below only need the macOS slice. A
        # push to main (or the release-ffi workflow) builds the full multi-arch xcframework.
        if: matrix.os == 'macos-15'
        env:
          TEMPO_FFI_MACOS_ONLY: ${{ github.event_name == 'pull_request' && '1' || '' }}
        run: |
          rust/tempo-tx-ffi/build-xcframework.sh
          git diff --exit-code -- Sources/MPPTempoFFI/Generated Sources/CTempoTxFFI/include/tempo_tx_ffiFFI.h || {
            echo "::error::Committed UniFFI bindings/header drifted from tempo-primitives@1.8.0. Run rust/tempo-tx-ffi/build-xcframework.sh and commit Sources/MPPTempoFFI/Generated + Sources/CTempoTxFFI/include/tempo_tx_ffiFFI.h."
            exit 1
          }
      - name: Swift FFI integration test (SwiftPM links Rust, gate on)
        # The real SwiftPM proof: `swift test` links the xcframework binaryTarget and the
        # FFITempoCloseTxBuilder seam conformer produces the same byte-exact golden 0x76
        # close tx. (The former standalone-swiftc smoke step was redundant with this and
        # the cargo golden test, and was dropped.)
        if: matrix.os == 'macos-15'
        run: MPP_TEMPO_FFI=1 swift test --filter MPPTempoFFITests
      - name: Live Moderato FFI write-path e2e (fund/open/voucher/close on-chain)
        # The authoritative on-chain proof the goldens defer to: against the live Moderato
        # node, faucet-fund a fresh key, then build (via the FFI), sign, broadcast, and
        # confirm a real open + close of a channel. Reuses this job's already-built
        # xcframework. NON-REQUIRED and live (depends on a third party being up + opens
        # network egress), consistent with the other Moderato jobs; disable if flaky.
        if: matrix.os == 'macos-15'
        env:
          MPP_TEMPO_FFI: "1"
          MPP_MODERATO_E2E: "1"
        run: swift test --filter ModeratoE2ETests
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: matrix.os == 'macos-15'
        with:
          node-version: "20"
      - name: Cross-SDK channel conformance (forward + reverse, live on Moderato)
        # The bidirectional channel proof: our TempoChannelMethod opens/vouchers/closes
        # against the mppx reference session server (forward), and the mppx client does the
        # same against our SessionMethod server (reverse), each settled on-chain via the
        # faucet. Reuses this job's already-built xcframework (the run scripts set
        # MPP_TEMPO_FFI=1). NON-REQUIRED + live, consistent with the other Moderato jobs.
        if: matrix.os == 'macos-15'
        run: |
          Scripts/conformance/run-session.sh
          Scripts/conformance/run-session-reverse.sh
      - name: Audit Rust dependencies (RustSec advisory DB)
        # Closes the supply-chain gap (the Swift OSV gate does not cover Cargo deps).
        # OS-independent, so run once (Linux leg). Fails on a known advisory.
        if: matrix.os == 'ubuntu-latest'
        working-directory: rust/tempo-tx-ffi
        run: |
          cargo install cargo-audit --locked
          cargo audit

  linux-ffi:
    name: Linux FFI (Rust staticlib + Swift link)
    # NON-REQUIRED: the Linux counterpart to the macOS xcframework leg. SwiftPM has no
    # library binaryTarget on Linux, so MPPTempoFFI links libtempo_tx_ffi.a directly
    # (linkerSettings) and gets the C module from CTempoTxFFI. This builds the Rust
    # staticlib and runs the same gated golden test. Runs in the swift container (has
    # Swift) and installs Rust + build-essential (the rust-ffi job's plain ubuntu VM has
    # no Swift). Compiles the large revm tree, so it is slow + non-required. Pinned by
    # digest like the `linux` job (rotated together).
    runs-on: ubuntu-latest
    container: swift@sha256:cf429de05c3e84a230a75e68eaa7bf7d1367ef9dde0a1278fb2a3d53d1881040
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Cache Cargo + crate target
        # Same shape as the rust-ffi job's cache (the revm/tempo compile is the cost),
        # but a DISTINCT key prefix: this job builds in the swift container while
        # rust-ffi's Linux leg builds on the bare VM, so their compiled target/ differs
        # and must not share a (write-once) key. See the note in the rust-ffi job.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/tempo-tx-ffi/target
          key: linux-ffi-${{ runner.os }}-cargo-${{ hashFiles('rust/tempo-tx-ffi/Cargo.lock') }}
          restore-keys: linux-ffi-${{ runner.os }}-cargo-
      - name: Install build tools + Rust (>= 1.93, tempo-primitives MSRV)
        run: |
          apt-get update -qq && apt-get install -y -qq curl ca-certificates build-essential
          curl -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Verify rustc >= 1.93
        run: |
          ver=$("$HOME/.cargo/bin/rustc" --version | awk '{print $2}')
          printf '1.93.0\n%s\n' "$ver" | sort -V -C || {
            echo "::error::rustc $ver is below the 1.93 floor"; exit 1; }
          echo "rustc $ver OK"
      - name: Build the Linux static lib
        run: rust/tempo-tx-ffi/build-linux-lib.sh
      - name: Swift FFI integration test (links the staticlib, gate on)
        env:
          MPP_TEMPO_FFI: "1"
        run: swift test --filter MPPTempoFFITests

  lint:
    name: Lint
    runs-on: macos-15
    env:
      # Pinned tool versions (was `brew install`, which floats and reinstalls every run).
      # Bump deliberately; a version bump is a reviewable diff that can shift lint rules.
      SWIFTFORMAT_VERSION: "0.61.1"
      SWIFTLINT_VERSION: "0.63.3"
      # SHA-256 of the pinned release zips. Verified before use so a compromised or
      # swapped GitHub release asset fails the build (brew verified bottle checksums;
      # this keeps that integrity guarantee with the direct download). Recompute and
      # bump alongside the version.
      SWIFTFORMAT_SHA256: "b990400779aceb7d7020796eb9ba814d4480543f671d38fc0ff48cb72f04c584"
      SWIFTLINT_SHA256: "fb045e85e7cb3374f42a4840b6b85a0106302afa69035c0c6f29af4a44c810b6"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Cache pinned lint tools
        id: lint-tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.lint-tools
          key: lint-tools-sf${{ env.SWIFTFORMAT_VERSION }}-sl${{ env.SWIFTLINT_VERSION }}
      - name: Download + verify pinned SwiftFormat + SwiftLint
        if: steps.lint-tools.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/.lint-tools /tmp/sf /tmp/sl
          curl -fsSL "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat.zip" -o /tmp/swiftformat.zip
          echo "${SWIFTFORMAT_SHA256}  /tmp/swiftformat.zip" | shasum -a 256 -c -
          unzip -oq /tmp/swiftformat.zip -d /tmp/sf
          install -m 0755 "$(find /tmp/sf -type f -name swiftformat | head -1)" ~/.lint-tools/swiftformat
          curl -fsSL "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip" -o /tmp/swiftlint.zip
          echo "${SWIFTLINT_SHA256}  /tmp/swiftlint.zip" | shasum -a 256 -c -
          unzip -oq /tmp/swiftlint.zip -d /tmp/sl
          install -m 0755 "$(find /tmp/sl -type f -name swiftlint | head -1)" ~/.lint-tools/swiftlint
      - name: Put lint tools on PATH
        run: echo "$HOME/.lint-tools" >> "$GITHUB_PATH"
      - name: SwiftFormat (lint mode)
        run: swiftformat --lint .
      - name: SwiftLint
        run: swiftlint --strict
      - name: No em dashes (repo-wide)
        run: |
          # swiftlint enforces .swift; this covers markdown, configs, everything
          # tracked. Fixed-string match (-F) on the literal U+2014 bytes, so it
          # does not depend on PCRE (-P) support, which could otherwise error and
          # silently pass. An en dash (U+2013, range separator) is allowed.
          emdash=$(printf '\xe2\x80\x94')
          if git grep -nF "$emdash" -- . ; then
            echo "::error::Em dash (U+2014) found. Use a colon, comma, or semicolon."
            exit 1
          fi
      - name: Secret scan (no credentials in source)
        run: |
          # Backs the SECURITY.md supply-chain policy: fail the build if a real
          # credential pattern is committed. High-signal patterns only (PEM private
          # keys, cloud/VCS/registry token prefixes), so the hex/byte test vectors do
          # not false-positive. Patterns live in a data file read with `git grep -f`,
          # so EVERY tracked file (including the workflows themselves) is scanned and
          # only the pattern file is excluded (it would otherwise self-match). Extend
          # by editing .github/secret-scan-patterns.txt.
          # git grep exit: 0 = match (fail), 1 = no match (pass), >=2 = error.
          # Capture the status so an error fails CLOSED instead of passing silently.
          rc=0
          git grep -nE -f .github/secret-scan-patterns.txt \
            -- . ':(exclude).github/secret-scan-patterns.txt' || rc=$?
          if [ "$rc" -eq 0 ]; then
            echo "::error::Possible committed credential. Remove it and rotate the secret."
            exit 1
          elif [ "$rc" -ne 1 ]; then
            echo "::error::secret scan failed to run (git grep exit $rc); failing closed."
            exit 1
          fi
