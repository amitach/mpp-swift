name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; no job needs write access (the SECURITY.md
# supply-chain policy). Grant extra scope per-job if ever required.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: Tests (macOS, Swift 6)
    runs-on: macos-15
    steps:
      # Actions are pinned to a full commit SHA, never a mutable tag (tj-actions
      # CVE-2025-30066). Dependabot bumps the SHA.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Flaky-hunter (repeated, randomized order)
        run: |
          for i in 1 2 3 4 5; do
            echo "::group::iteration $i"
            swift test --parallel || exit 1
            echo "::endgroup::"
          done

  audit:
    name: Dependency audit (OSV)
    runs-on: macos-15 # has swift + jq + curl preinstalled
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Resolve dependencies
        run: swift package resolve
      - name: OSV advisory scan (SwiftURL, both name forms)
        # Fails the build if any pinned dependency version has a known advisory
        # in the OSV/GitHub Advisory Database. Backs the SECURITY.md monitoring
        # policy with an enforced gate.
        run: ./Scripts/dependency-audit.sh Package.resolved

  linux:
    name: Tests (Linux, Swift 6)
    runs-on: ubuntu-latest
    # Base image pinned by digest, not the mutable `swift:6.0` tag (the aquasec/trivy
    # Docker Hub compromise, Mar 2026, overwrote mutable tags). Digest captured
    # 2026-05-29 for swift:6.0 (6.0.3). Bump deliberately with the tag comment.
    container: swift@sha256:cf429de05c3e84a230a75e68eaa7bf7d1367ef9dde0a1278fb2a3d53d1881040
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: SwiftFormat (lint mode)
        run: |
          brew install swiftformat
          swiftformat --lint .
      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint --strict
      - name: No em dashes (repo-wide)
        run: |
          # swiftlint enforces .swift; this covers markdown, configs, everything
          # tracked. Fixed-string match (-F) on the literal U+2014 bytes, so it
          # does not depend on PCRE (-P) support, which could otherwise error and
          # silently pass. An en dash (U+2013, range separator) is allowed.
          emdash=$(printf '\xe2\x80\x94')
          if git grep -nF "$emdash" -- . ; then
            echo "::error::Em dash (U+2014) found. Use a colon, comma, or semicolon."
            exit 1
          fi
      - name: Secret scan (no credentials in source)
        run: |
          # Backs the SECURITY.md supply-chain policy: fail the build if a real
          # credential pattern is committed. Targeted high-signal patterns only
          # (PEM private keys, cloud/VCS/registry token prefixes), so the
          # hex/byte test vectors do not false-positive. Extend as needed.
          patterns='-----BEGIN [A-Z ]*PRIVATE KEY-----|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{22,}|npm_[A-Za-z0-9]{36}|xox[baprs]-[A-Za-z0-9-]+|AIza[0-9A-Za-z_-]{35}'
          # -e marks the pattern explicitly (it begins with "-", which git grep
          # would otherwise parse as an option).
          if git grep -nE -e "$patterns" -- . ':(exclude).github/workflows/ci.yml' ; then
            echo "::error::Possible committed credential. Remove it and rotate the secret."
            exit 1
          fi
