name: Devin Review

# Automated PR review by Devin (https://docs.devin.ai/work-with-devin/devin-review).
#
# Setup (one-time): add a repository secret named DEVIN_API_KEY
#   (Settings -> Secrets and variables -> Actions -> New repository secret).
# Without the secret this job skips cleanly, so CI never fails for contributors
# or forks that do not have a key.
#
# Alternative (no workflow needed): enable auto-review for this repo in the
# Devin app at https://app.devin.ai (Settings -> Review). That path reviews on
# PR open, new commits, ready-for-review, and reviewer/assignee changes.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: devin-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Devin PR review
    runs-on: ubuntu-latest
    env:
      DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
    steps:
      - name: Request Devin review
        if: ${{ env.DEVIN_API_KEY != '' && github.event.pull_request.draft == false }}
        run: npx --yes devin-review "${{ github.event.pull_request.html_url }}"
