# SwiftLint configuration for mpp-swift.
# File-size discipline is intentional: one type per file, split before a file sprawls.

# Trailing commas in multiline collections are idiomatic and reduce diff noise; require them.
trailing_comma:
  mandatory_comma: true

file_length:
  warning: 400
  error: 600
type_body_length:
  warning: 250
  error: 400
function_body_length:
  warning: 50
  error: 100
line_length:
  warning: 100
  error: 140
  ignores_comments: true
  ignores_urls: true

opt_in_rules:
  - missing_docs
  - force_unwrapping
  - empty_count
  - explicit_init
  - first_where
  - sorted_first_last
  - redundant_nil_coalescing
  - closure_spacing
  - operator_usage_whitespace

# Force unwrapping is banned in library code (use guard/throw).
force_unwrapping:
  severity: error
force_try:
  severity: error
force_cast:
  severity: error

# Project prose style: no em dashes (use a colon, comma, or semicolon). Enforced
# in Swift sources because the rule had leaked into comments before anything
# checked. An en dash (range separator, e.g. 0x00-0x1F) is unaffected.
custom_rules:
  no_em_dash:
    name: "No Em Dash"
    regex: '\x{2014}'
    message: "No em dashes: use a colon, comma, or semicolon."
    severity: error

# Public API must be documented. Error severity on public + open;
# fails CI until every public/open decl has a doc comment.
missing_docs:
  error: [open, public]

excluded:
  - .build
  - Tests/MPPVectorsTests/Fixtures
  # The Rust FFI crate's Swift smoke harness is not SDK source and does not follow
  # the SDK Swift style (long golden-hex literals, a script-style main).
  - rust
  # UniFFI-generated bindings (committed + drift-checked in CI against the pinned
  # crate). Generated verbatim, carries its own `swiftlint:disable all`, not ours to lint.
  - Sources/MPPTempoFFI/Generated
